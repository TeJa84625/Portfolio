<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Project Details</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="project_detail.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            /* Light gray background */
            color: #333;
        }

        /* Custom styles for spinner and lightbox */
        .loading-spinner-container-detail {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .loading-spinner-detail {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #3b82f6;
            /* Blue-600 */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .lightbox {
            display: none;
            /* Hidden by default */
            position: fixed;
            /* Stay in place */
            z-index: 1000;
            /* Sit on top */
            padding-top: 60px;
            /* Location of the box */
            left: 0;
            top: 0;
            width: 100%;
            /* Full width */
            height: 100%;
            /* Full height */
            overflow: auto;
            /* Enable scroll if needed */
            background-color: rgba(0, 0, 0, 0.9);
            /* Black w/ opacity */
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lightbox-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80%;
            border-radius: 0.5rem;
            /* rounded-lg */
        }

        .lightbox-close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .lightbox-close:hover,
        .lightbox-close:focus {
            color: #bbb;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">
    <!-- Header Section (from Home Page) -->
    <header class="bg-white shadow-md py-4 px-6 md:px-10 lg:px-16 flex justify-between items-center rounded-b-lg">
        <!-- Logo -->
        <div class="flex items-center">
            <a href="index.html"
                class="text-2xl font-bold text-gray-800 hover:text-blue-600 transition duration-300 ease-in-out">
                <!-- Placeholder for your logo (e.g., an SVG or text) -->
                <span class="text-blue-600">G</span>TEJA
            </a>
        </div>

        <!-- Navigation Bar -->
        <nav>
            <ul class="flex space-x-4 md:space-x-8">
                <li><a href="index.html"
                        class="text-gray-700 hover:text-blue-600 font-medium transition duration-300 ease-in-out px-3 py-2 rounded-md">Home</a>
                </li>
                <li><a href="projects.html"
                        class="text-gray-700 hover:text-blue-600 font-medium transition duration-300 ease-in-out px-3 py-2 rounded-md">Projects</a>
                </li>
                <li><a href="about.html"
                        class="text-gray-700 hover:text-blue-600 font-medium transition duration-300 ease-in-out px-3 py-2 rounded-md">About</a>
                </li>
                <li><a href="contact.html"
                        class="text-gray-700 hover:text-blue-600 font-medium transition duration-300 ease-in-out px-3 py-2 rounded-md">Contact</a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Main Content Wrapper -->
    <div class="flex-grow p-6 md:p-10 lg:p-16">
        <!-- <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-8 text-center">Project <span
                class="text-blue-600">Details</span></h1> -->

        <div class="main-content-wrapper bg-white p-6 rounded-lg shadow-lg">
            <div class="back-button-container mb-6">
                <a href="projects.html"
                    class="inline-flex items-center bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-md shadow-sm transition duration-300 ease-in-out">
                    <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="currentColor"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6l6 6l1.41-1.41z" />
                    </svg>
                    Back to Projects
                </a>
            </div>

            <section class="project-details-page" id="projectDetailsPage">
                <div class="loading-spinner-container-detail" id="projectDetailSpinnerContainer">
                    <div class="loading-spinner-detail"></div>
                    <p class="text-gray-600 mt-2">Loading project details...</p>
                </div>
                <!-- Project details will be injected here by JavaScript -->
            </section>
        </div>
    </div>

    <!-- Lightbox for images -->
    <div id="lightbox"
        class="lightbox fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 hidden">
        <span class="lightbox-close absolute top-4 right-6 text-white text-5xl font-bold cursor-pointer">&times;</span>
        <img class="lightbox-content max-w-full max-h-[80vh] rounded-lg" id="lightboxImage">
    </div>

    <!-- Footer Section (Optional) -->
    <footer class="bg-gray-800 text-white text-center py-4 mt-auto rounded-t-lg">
        <p>&copy; 2025 My Portfolio. All rights reserved.</p>
    </footer>

    <!-- Firebase and Project Details JavaScript -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="project_detail.js"></script>
</body>

</html>
